<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Hasil Tryout | KSATRIA AKADEMI</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Google Font -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet"
          href="result.css">

</head>

<body>

<section class="result-section">

    <div class="container">

        <div class="result-card">

            <!-- Logo -->

            <img src="images/logo.png"
                 class="result-logo"
                 alt="KSATRIA AKADEMI">

            <h2>

                HASIL TRYOUT

            </h2>

            <p class="subtitle">

                KSATRIA AKADEMI

            </p>

            <!-- Nilai -->

            <div class="score-circle">

                <span id="score">

                    0

                </span>

            </div>

            <h4 id="statusText">

                Sangat Baik

            </h4>
                      <!-- Participant Info -->


            <div class="participant-info">


                <div class="info-item">


                    <span>

                        Nama Peserta

                    </span>


                    <strong id="participantName">

                        -

                    </strong>


                </div>




                <div class="info-item">


                    <span>

                        Asal Sekolah

                    </span>


                    <strong id="participantSchool">

                        -

                    </strong>


                </div>




                <div class="info-item">


                    <span>

                        Program

                    </span>


                    <strong id="participantProgram">

                        -

                    </strong>


                </div>




                <div class="info-item">


                    <span>

                        Tanggal Ujian

                    </span>


                    <strong id="examDate">

                        -

                    </strong>


                </div>


            </div>





            <!-- Statistics -->


            <div class="statistics">


                <div class="stat-box">


                    <i class="bi bi-check-circle-fill"></i>


                    <h3 id="correctAnswer">

                        0

                    </h3>


                    <p>

                        Jawaban Benar

                    </p>


                </div>





                <div class="stat-box">


                    <i class="bi bi-x-circle-fill"></i>


                    <h3 id="wrongAnswer">

                        0

                    </h3>


                    <p>

                        Jawaban Salah

                    </p>


                </div>




                <div class="stat-box">


                    <i class="bi bi-question-circle-fill"></i>


                    <h3 id="totalAnswer">

                        0

                    </h3>


                    <p>

                        Total Soal

                    </p>


                </div>


            </div>





            <!-- Motivation -->


            <div class="motivation">


                <i class="bi bi-stars"></i>


                <p>

                    Terus belajar, terus berjuang.
                    Setiap latihan adalah langkah menuju
                    prestasi bersama KSATRIA AKADEMI.

                </p>


            </div>





            <!-- Action Button -->


            <div class="result-button">


                <button id="discussionBtn"
                        class="btn-discussion">


                    <i class="bi bi-book-half"></i>


                    Lihat Pembahasan


                </button>

<a href="certificate.html"
   class="btn-certificate">

    <i class="bi bi-patch-check-fill"></i>

    Klaim Sertifikat

</a>



                <a href="index.html"
                   class="btn-home">


                    <i class="bi bi-house-fill"></i>


                    Kembali ke Beranda


                </a>


            </div>


        </div>


    </div>


</section>




<script src="result.js"></script>


</body>


</html>
